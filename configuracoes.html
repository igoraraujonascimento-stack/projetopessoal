<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - SENAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="header-brand">
                <span class="sistema-text">Sistema</span>
                <span class="fiep-text">Fiep</span>
            </div>
            <ul>
                <li><a href="inicio.html">Início</a></li>
                <li><a href="eventos.html">Eventos</a></li>
                <li><a href="index.html#sobre">Sobre</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <aside>
            <div class="menu-box">
                <h2>Menu</h2>
                <ul>
                    <li><button type="button">Configurações</button></li>
                    <li><button type="button">Fotos</button></li>
                    <li><button type="button">Alunos</button></li>
                    <li><button type="button">Recados</button></li>
                </ul>
            </div>
        </aside>
        <main>
            <h2>Configurações</h2>
            <p>Personalize suas preferências e configurações de conta no sistema SENAI.</p>
            
            <section class="settings-section">
                <h3>Perfil</h3>
                <div class="settings-item">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" value="">
                </div>
                <div class="settings-item">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="seu.email@senai.br" value="">
                </div>
                <div class="settings-item">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" placeholder="(11) 9999-9999" value="">
                </div>
            </section>

            <section class="settings-section">
                <h3>Preferências de Notificação</h3>
                <div class="settings-checkbox">
                    <input type="checkbox" id="notif-email" checked>
                    <label for="notif-email">Receber notificações por email</label>
                </div>
                <div class="settings-checkbox">
                    <input type="checkbox" id="notif-eventos" checked>
                    <label for="notif-eventos">Avisos sobre novos eventos</label>
                </div>
                <div class="settings-checkbox">
                    <input type="checkbox" id="notif-cursos">
                    <label for="notif-cursos">Notificações de cursos disponíveis</label>
                </div>
                <div class="settings-checkbox">
                    <input type="checkbox" id="notif-newsletter">
                    <label for="notif-newsletter">Receber newsletter mensal</label>
                </div>
            </section>

            <section class="settings-section">
                <h3>Privacidade e Segurança</h3>
                <div class="settings-checkbox">
                    <input type="checkbox" id="privac-perfil" checked>
                    <label for="privac-perfil">Perfil visível para outros usuários</label>
                </div>
                <div class="settings-item">
                    <label for="senha">Alterar Senha:</label>
                    <input type="password" id="senha" placeholder="Nova senha">
                </div>
                <div class="settings-item">
                    <label for="confirmSenha">Confirmar Senha:</label>
                    <input type="password" id="confirmSenha" placeholder="Confirme a nova senha">
                </div>
            </section>

            <section class="settings-section">
                <h3>Temas e Aparência</h3>
                <div class="settings-item">
                    <label for="tema">Tema:</label>
                    <select id="tema">
                        <option value="claro">Claro</option>
                        <option value="escuro">Escuro</option>
                        <option value="auto">Automático</option>
                    </select>
                </div>
                <div class="settings-item">
                    <label for="idioma">Idioma:</label>
                    <select id="idioma">
                        <option value="pt-br">Português (Brasil)</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                    </select>
                </div>
            </section>

            <div class="settings-actions">
                <button class="btn-save">Salvar Alterações</button>
                <button class="btn-cancel">Cancelar</button>
            </div>
        </main>
    </div>
    <footer>
        <p>Desenvolvido por: Igor Araújo do Nascimento</p>
        <div class="social-links">
            <a href="#" class="fab fa-instagram"></a>
            <a href="#" class="fab fa-github"></a>
        </div>
    </footer>
</body>
</html>
